<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运营报表中心</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/reports.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>

<div class="header">
    <h1>运营报表中心</h1>
    <div class="nav">
        <a href="/" class="nav-btn">‹ 返回看板</a>
    </div>
</div>

<!-- Top-level tab groups -->
<div class="tab-bar" id="tabBar">
    <div class="tab active" data-group="sales">销售分析</div>
    <div class="tab" data-group="category">品类分析</div>
    <div class="tab" data-group="product">商品监控</div>
    <div class="tab" data-group="supplier">供应商分析</div>
</div>

<!-- Sub tabs per group -->
<div class="sub-tab-bar" id="subTabBar"></div>

<!-- Filter bar -->
<div class="filter-bar" id="filterBar"></div>

<!-- Content -->
<div class="content">
    <div class="panel">
        <h3 id="reportTitle">--</h3>
        <div class="row-count" id="rowCount"></div>
        <div id="chartArea" class="hidden"><div class="chart-container" id="mainChart"></div></div>
        <div class="table-wrap" id="tableWrap">
            <div class="status-msg">请选择报表并点击查询</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
<script src="/static/js/reports.js"></script>
</body>
</html>
