<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品类分析 - 宜家天润超市</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/report_embed.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script>if (typeof echarts === 'undefined') document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"><\/script>')</script>
</head>
<body>

    <div class="header">
        <div class="subpage-header-left">
            <a href="/" class="back-btn" title="返回首页"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></a>
            <h1>品类分析</h1>
        </div>
        <div class="header-right">
            <div class="date-info">
                数据日期: <span class="date-val" id="dataDate">加载中...</span>
                <br>刷新时间: <span id="refreshTime"></span>
            </div>
        </div>
    </div>

    <div class="dashboard">

        <!-- 报表区：T3 / T11.2 -->
        <div class="chart-panel">
            <div class="rpt-shortcut-row" id="rptTabRow">
                <div class="rpt-shortcut" data-report="t3" onclick="openCategoryReport('t3')">
                    <div class="rpt-shortcut-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/>
                            <path d="M22 12A10 10 0 0 0 12 2v10z"/>
                        </svg>
                    </div>
                    <div class="rpt-shortcut-name">T3 品类销售分析</div>
                    <div class="rpt-shortcut-desc">销售额 · 毛利 · 动销率</div>
                </div>
                <div class="rpt-shortcut" data-report="t11_2" onclick="openCategoryReport('t11_2')">
                    <div class="rpt-shortcut-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="20" x2="18" y2="10"/>
                            <line x1="12" y1="20" x2="12" y2="4"/>
                            <line x1="6"  y1="20" x2="6"  y2="14"/>
                        </svg>
                    </div>
                    <div class="rpt-shortcut-name">T11.2 品类动销率</div>
                    <div class="rpt-shortcut-desc">单品数 · 动销 · 不动销</div>
                </div>
            </div>
            <div id="rptPanel" style="display:none;">
                <div class="filter-bar" id="rptFilterBar"></div>
                <div id="rptRowCount" class="rpt-meta"></div>
                <div id="rptChartArea" class="hidden">
                    <div id="rptMainChart" style="height:280px;margin-bottom:8px;"></div>
                </div>
                <div id="rptTableWrap" class="table-wrap">
                    <div class="status-msg">请点击查询按钮</div>
                </div>
            </div>
        </div>

        <!-- 品类销售分布 + 品类时段客流 -->
        <div class="charts-row">
            <div class="chart-panel">
                <div class="panel-header">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <button id="categoryBackBtn" onclick="drillUpCategory()" style="display:none;background:transparent;border:1px solid #4fc3f7;color:#4fc3f7;padding:2px 10px;border-radius:5px;font-size:12px;cursor:pointer;line-height:1.5;">返回</button>
                        <h3 id="categoryChartTitle">品类销售分布</h3>
                    </div>
                    <select class="store-filter" id="categoryStoreFilter">
                        <option value="">全部门店</option>
                    </select>
                </div>
                <div class="chart-container tall" id="categoryChart"></div>
            </div>
            <div class="chart-panel">
                <h3 id="categoryHourlyTitle">品类时段客流分布 <span style="color:#78909c;font-size:12px;font-weight:normal">（点击左侧环形图选择品类）</span></h3>
                <div class="chart-container tall" id="categoryHourlyChart">
                    <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#546e7a;font-size:14px;">选择品类后显示</div>
                </div>
            </div>
        </div>
    </div>

    <div class="refresh-info">数据每5分钟缓存刷新 | 页面每10分钟自动刷新</div>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
    <script src="/static/js/report_utils.js"></script>
    <script src="/static/js/category.js"></script>
</body>
</html>
