<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宜家天润超市数据看板</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>

    <div class="header">
        <h1>宜家天润超市数据看板</h1>
        <div class="header-right">
            <div class="date-info">
                数据日期: <span class="date-val" id="dataDate">加载中...</span>
                <br>刷新时间: <span id="refreshTime"></span>
            </div>
        </div>
    </div>

    <div class="dashboard">
        <!-- Row 1: KPI Cards -->
        <div class="kpi-row">
            <div class="kpi-card">
                <div class="kpi-label">今日销售额</div>
                <div class="kpi-value" id="kpiSales">--</div>
                <div class="kpi-change" id="kpiSalesChange">--</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">毛利额</div>
                <div class="kpi-value" id="kpiProfit">--</div>
                <div class="kpi-change" id="kpiProfitChange">--</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">交易笔数</div>
                <div class="kpi-value" id="kpiBills">--</div>
                <div class="kpi-change" id="kpiBillsChange">--</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">客单价</div>
                <div class="kpi-value" id="kpiTicket">--</div>
                <div class="kpi-change" id="kpiTicketSub">--</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">毛利率</div>
                <div class="kpi-value" id="kpiProfitRate">--</div>
                <div class="kpi-change" id="kpiMembers">--</div>
            </div>
        </div>

        <!-- Module Navigation Grid -->
        <div class="module-nav">
            <a href="/sales" class="module-card">
                <div class="module-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 12 18 7 12 13 8 9 2 15"/>
                        <polyline points="16 7 22 7 22 13"/>
                    </svg>
                </div>
                <div class="module-name">销售分析</div>
                <div class="module-desc">趋势 · 门店对比</div>
            </a>

            <a href="/stores" class="module-card">
                <div class="module-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                </div>
                <div class="module-name">门店运营</div>
                <div class="module-desc">排名 · 客流时段</div>
            </a>

            <a href="/category" class="module-card">
                <div class="module-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/>
                        <path d="M22 12A10 10 0 0 0 12 2v10z"/>
                    </svg>
                </div>
                <div class="module-name">品类分析</div>
                <div class="module-desc">分布 · 时段客流</div>
            </a>

            <a href="/products" class="module-card">
                <div class="module-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="21 8 21 21 3 21 3 8"/>
                        <rect x="1" y="3" width="22" height="5"/>
                        <line x1="10" y1="12" x2="14" y2="12"/>
                    </svg>
                </div>
                <div class="module-name">商品管理</div>
                <div class="module-desc">热销 TOP 15</div>
            </a>

            <a href="/supply" class="module-card">
                <div class="module-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="1" y="3" width="15" height="13"/>
                        <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/>
                        <circle cx="5.5" cy="18.5" r="2.5"/>
                        <circle cx="18.5" cy="18.5" r="2.5"/>
                    </svg>
                </div>
                <div class="module-name">供应链</div>
                <div class="module-desc">供应商 · 库存</div>
            </a>

            <a href="/reports" class="module-card">
                <div class="module-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <line x1="10" y1="9" x2="8" y2="9"/>
                    </svg>
                </div>
                <div class="module-name">报表中心</div>
                <div class="module-desc">13 张专项报表</div>
            </a>
        </div>
    </div>

    <div class="refresh-info">
        数据每5分钟缓存刷新 | 页面每10分钟自动刷新
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
