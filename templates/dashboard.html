<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宜家天润超市数据看板</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script>if (typeof echarts === 'undefined') document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"><\/script>')</script>
</head>
<body>

    <div class="header">
        <h1>宜家天润超市数据看板</h1>
        <div class="header-right">
            <a href="/reports" class="nav-btn">报表中心 ›</a>
            <div class="date-info">
                数据日期: <span class="date-val" id="dataDate">加载中...</span>
                <br>刷新时间: <span id="refreshTime"></span>
            </div>
        </div>
    </div>

    <div class="dashboard">
        <!-- Row 1: KPI Cards -->
        <div class="kpi-row" id="kpiRow">
            <div class="kpi-card">
                <div class="kpi-label">今日销售额</div>
                <div class="kpi-value" id="kpiSales">--</div>
                <div class="kpi-change" id="kpiSalesChange">--</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">毛利额</div>
                <div class="kpi-value" id="kpiProfit">--</div>
                <div class="kpi-change" id="kpiProfitChange">--</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">交易笔数</div>
                <div class="kpi-value" id="kpiBills">--</div>
                <div class="kpi-change" id="kpiBillsChange">--</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">客单价</div>
                <div class="kpi-value" id="kpiTicket">--</div>
                <div class="kpi-change" id="kpiTicketSub">--</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">毛利率</div>
                <div class="kpi-value" id="kpiProfitRate">--</div>
                <div class="kpi-change" id="kpiMembers">--</div>
            </div>
        </div>

        <!-- Row 2: 各时段总客流（全宽） -->
        <div class="chart-panel">
            <h3>各时段总客流</h3>
            <div class="chart-container" id="hourlyChart"></div>
        </div>

        <!-- Row 3: 热销商品（全宽，右上角门店筛选器） -->
        <div class="chart-panel">
            <div class="panel-header">
                <h3>热销商品 TOP 15</h3>
                <select class="store-filter" id="topProductsStoreFilter">
                    <option value="">全部门店</option>
                </select>
            </div>
            <div id="topProducts">
                <div class="loading">加载中</div>
            </div>
        </div>

        <!-- Row 4: 品类销售(1/2) + 品类时段客流(1/2) -->
        <div class="charts-row">
            <div class="chart-panel">
                <div class="panel-header">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <button id="categoryBackBtn" onclick="drillUpCategory()" style="display:none;background:transparent;border:1px solid #4fc3f7;color:#4fc3f7;padding:2px 10px;border-radius:5px;font-size:12px;cursor:pointer;line-height:1.5;">返回</button>
                        <h3 id="categoryChartTitle">品类销售分布</h3>
                    </div>
                    <select class="store-filter" id="categoryStoreFilter">
                        <option value="">全部门店</option>
                    </select>
                </div>
                <div class="chart-container tall" id="categoryChart"></div>
            </div>
            <div class="chart-panel">
                <h3 id="categoryHourlyTitle">品类时段客流分布 <span style="color:#78909c;font-size:12px;font-weight:normal">（点击左侧环形图选择品类）</span></h3>
                <div class="chart-container tall" id="categoryHourlyChart">
                    <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#546e7a;font-size:14px;">选择品类后显示</div>
                </div>
            </div>
        </div>

        <!-- Row 5: 门店近7天销售额趋势（全宽） -->
        <div class="chart-panel">
            <h3>门店近7天销售额趋势</h3>
            <div class="chart-container tall" id="storeTrendChart"></div>
        </div>

        <!-- Row 6: 近30天销售趋势（全宽） -->
        <div class="chart-panel">
            <h3>近30天销售趋势</h3>
            <div class="chart-container tall" id="trendChart"></div>
        </div>

        <!-- Row 7: 门店销售排名（全宽） -->
        <div class="chart-panel">
            <h3>门店销售排名</h3>
            <div class="chart-container" id="storeChart"></div>
        </div>
    </div>

    <div class="refresh-info">
        数据每5分钟缓存刷新 | 页面每10分钟自动刷新
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
