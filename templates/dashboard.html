<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宜家天润超市 - 运营决策看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script>if (typeof echarts === 'undefined') document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"><\/script>')</script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            background: #0f1923;
            color: #e0e6ed;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a2a3a 0%, #0d253a 100%);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1e90ff33;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, #4fc3f7, #29b6f6, #039be5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
        }

        .header .date-info {
            font-size: 14px;
            color: #78909c;
        }

        .header .date-info .date-val {
            color: #4fc3f7;
            font-weight: 600;
            font-size: 16px;
        }

        .dashboard {
            padding: 16px;
            display: grid;
            gap: 16px;
        }

        /* KPI Cards Row */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
        }

        .kpi-card {
            background: linear-gradient(135deg, #1a2a3a 0%, #162436 100%);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #1e3a5f;
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 12px 12px 0 0;
        }

        .kpi-card:nth-child(1)::before {
            background: linear-gradient(90deg, #4fc3f7, #039be5);
        }

        .kpi-card:nth-child(2)::before {
            background: linear-gradient(90deg, #66bb6a, #43a047);
        }

        .kpi-card:nth-child(3)::before {
            background: linear-gradient(90deg, #ffa726, #f57c00);
        }

        .kpi-card:nth-child(4)::before {
            background: linear-gradient(90deg, #ab47bc, #8e24aa);
        }

        .kpi-card:nth-child(5)::before {
            background: linear-gradient(90deg, #ef5350, #e53935);
        }

        .kpi-label {
            font-size: 13px;
            color: #78909c;
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 28px;
            font-weight: 700;
            color: #e0e6ed;
        }

        .kpi-change {
            font-size: 12px;
            margin-top: 6px;
        }

        .kpi-change.up {
            color: #66bb6a;
        }

        .kpi-change.down {
            color: #ef5350;
        }

        .kpi-unit {
            font-size: 14px;
            color: #78909c;
            margin-left: 4px;
        }

        /* Chart Panels */
        .charts-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
        }

        .charts-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        .chart-panel {
            background: linear-gradient(135deg, #1a2a3a 0%, #162436 100%);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #1e3a5f;
        }

        .chart-panel h3 {
            font-size: 15px;
            color: #90caf9;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #1e3a5f44;
        }

        .chart-container {
            width: 100%;
            height: 300px;
            min-width: 0;
        }

        .chart-container.tall {
            height: 400px;
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #546e7a;
        }

        .loading::after {
            content: '';
            width: 24px;
            height: 24px;
            border: 3px solid #1e3a5f;
            border-top-color: #4fc3f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Top Products Table */
        .product-table {
            width: 100%;
            font-size: 13px;
            border-collapse: collapse;
        }

        .product-table th {
            text-align: left;
            color: #78909c;
            padding: 6px 8px;
            border-bottom: 1px solid #1e3a5f;
            font-weight: 500;
        }

        .product-table td {
            padding: 7px 8px;
            border-bottom: 1px solid #1e3a5f33;
        }

        .product-table tr:hover td {
            background: #1e3a5f22;
        }

        .rank-badge {
            display: inline-block;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            text-align: center;
            line-height: 22px;
            font-size: 12px;
            font-weight: 700;
        }

        .rank-1 {
            background: #ffd54f;
            color: #333;
        }

        .rank-2 {
            background: #b0bec5;
            color: #333;
        }

        .rank-3 {
            background: #a1887f;
            color: #fff;
        }

        .rank-n {
            background: #37474f;
            color: #90a4ae;
        }

        .profit-positive {
            color: #66bb6a;
        }

        .profit-negative {
            color: #ef5350;
        }

        .refresh-info {
            text-align: center;
            padding: 8px;
            font-size: 12px;
            color: #455a64;
        }

        @media (max-width: 1200px) {
            .kpi-row {
                grid-template-columns: repeat(3, 1fr);
            }

            .charts-row,
            .charts-row-3 {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }

            .header h1 {
                font-size: 18px;
                letter-spacing: 2px;
            }

            .dashboard {
                padding: 8px;
                gap: 10px;
            }

            .kpi-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .kpi-card {
                padding: 14px;
            }

            .kpi-value {
                font-size: 22px;
            }

            .chart-panel {
                padding: 12px;
            }

            .chart-container {
                height: 260px;
                min-width: 0;
            }

            .chart-container.tall {
                height: 300px;
            }

            .product-table {
                font-size: 12px;
            }

            .product-table th,
            .product-table td {
                padding: 5px 4px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>宜家天润超市 运营决策看板</h1>
        <div class="date-info">
            <a href="/reports" style="color:#90caf9;text-decoration:none;margin-right:16px;">报表中心</a>
            数据日期: <span class="date-val" id="dataDate">加载中...</span>
            <br>刷新时间: <span id="refreshTime"></span>
        </div>
    </div>

    <div class="dashboard">
        <!-- KPI Cards -->
        <div class="kpi-row" id="kpiRow">
            <div class="kpi-card">
                <div class="kpi-label">今日销售额</div>
                <div class="kpi-value" id="kpiSales">--</div>
                <div class="kpi-change" id="kpiSalesChange">--</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">毛利额</div>
                <div class="kpi-value" id="kpiProfit">--</div>
                <div class="kpi-change" id="kpiProfitChange">--</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">交易笔数</div>
                <div class="kpi-value" id="kpiBills">--</div>
                <div class="kpi-change" id="kpiBillsChange">--</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">客单价</div>
                <div class="kpi-value" id="kpiTicket">--</div>
                <div class="kpi-change" id="kpiTicketSub">--</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">毛利率</div>
                <div class="kpi-value" id="kpiProfitRate">--</div>
                <div class="kpi-change" id="kpiMembers">--</div>
            </div>
        </div>

        <!-- Row 2: 30-day trend  -->
        <div class="charts-row">
            <div class="chart-panel">
                <h3>近30天销售趋势</h3>
                <div class="chart-container tall" id="trendChart"></div>
            </div>
        </div>

        <!-- Row 3: Store rank + Category + Hourly -->
        <div class="charts-row-3">
            <div class="chart-panel">
                <h3>门店销售排名</h3>
                <div class="chart-container tall" id="storeChart"></div>
            </div>
            <div class="chart-panel">
                <h3>品类销售分布</h3>
                <div class="chart-container tall" id="categoryChart"></div>
            </div>
            <div class="chart-panel">
                <h3>时段客流分析</h3>
                <div class="chart-container tall" id="hourlyChart"></div>
            </div>
        </div>

        <!-- Row 4: Top products + Store trend -->
        <div class="charts-row">
            <div class="chart-panel">
                <h3>热销商品 TOP 15</h3>
                <div id="topProducts">
                    <div class="loading">加载中</div>
                </div>
            </div>
            <div class="chart-panel">
                <h3>门店近7天销售额趋势</h3>
                <div class="chart-container tall" id="storeTrendChart"></div>
            </div>
        </div>
    </div>

    <div class="refresh-info">
        数据每5分钟缓存刷新 | 页面每10分钟自动刷新
    </div>

    <script>
        const fmt = (n) => {
            if (n >= 10000) return (n / 10000).toFixed(2) + '万';
            return n.toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        };
        const fmtMoney = (n) => {
            if (Math.abs(n) >= 10000) return (n / 10000).toFixed(2) + '万';
            return n.toFixed(0);
        };
        const changeHtml = (val, suffix = '%') => {
            if (val === 0) return `<span style="color:#78909c">持平</span>`;
            const cls = val > 0 ? 'up' : 'down';
            const arrow = val > 0 ? '↑' : '↓';
            return `<span class="kpi-change ${cls}">较昨日 ${arrow} ${Math.abs(val).toFixed(1)}${suffix}</span>`;
        };

        // Theme colors
        const colors = ['#4fc3f7', '#66bb6a', '#ffa726', '#ab47bc', '#ef5350', '#26c6da', '#ffca28', '#8d6e63', '#78909c', '#ec407a'];

        function initChart(id) {
            const dom = document.getElementById(id);
            if (!dom || typeof echarts === 'undefined') return null;
            // Dispose existing instance to avoid duplicate bindings
            const existing = echarts.getInstanceByDom(dom);
            if (existing) existing.dispose();
            return echarts.init(dom, null, { renderer: 'canvas' });
        }

        // ========== Load Data ==========
        async function loadAll() {
            try {
                document.getElementById('refreshTime', new Date().toLocaleTimeString());

                // Parallel fetch all APIs
                const [overview, trend, storeRank, category, hourly, topProducts, storeTrend] = await Promise.all([
                    fetch('/api/overview').then(r => r.json()),
                    fetch('/api/trend').then(r => r.json()),
                    fetch('/api/store_rank').then(r => r.json()),
                    fetch('/api/category').then(r => r.json()),
                    fetch('/api/hourly').then(r => r.json()),
                    fetch('/api/top_products').then(r => r.json()),
                    fetch('/api/store_trend').then(r => r.json()),
                ]);

                // Date
                document.getElementById('dataDate').textContent = overview.date;
                document.getElementById('refreshTime').textContent = new Date().toLocaleTimeString();

                // KPI
                document.getElementById('kpiSales').innerHTML = fmtMoney(overview.sales) + '<span class="kpi-unit">元</span>';
                document.getElementById('kpiSalesChange').innerHTML = changeHtml(overview.sales_change);
                document.getElementById('kpiProfit').innerHTML = fmtMoney(overview.profit) + '<span class="kpi-unit">元</span>';
                document.getElementById('kpiProfitChange').innerHTML = changeHtml(overview.profit_change);
                document.getElementById('kpiBills').innerHTML = fmt(overview.bills) + '<span class="kpi-unit">笔</span>';
                document.getElementById('kpiBillsChange').innerHTML = changeHtml(overview.bills_change);
                document.getElementById('kpiTicket').innerHTML = overview.avg_ticket.toFixed(1) + '<span class="kpi-unit">元</span>';
                document.getElementById('kpiTicketSub').innerHTML = `<span style="color:#78909c">会员消费 ${overview.members} 人</span>`;
                document.getElementById('kpiProfitRate').innerHTML = overview.profit_rate.toFixed(1) + '<span class="kpi-unit">%</span>';
                document.getElementById('kpiMembers').innerHTML = `<span style="color:#78909c">毛利率</span>`;

                // Render charts (each independent so one failure won't block others)
                renderTopProducts(topProducts);
                const renders = [
                    ['trendChart', () => renderTrend(trend)],
                    ['storeChart', () => renderStoreRank(storeRank)],
                    ['categoryChart', () => renderCategory(category)],
                    ['hourlyChart', () => renderHourly(hourly)],
                    ['storeTrendChart', () => renderStoreTrend(storeTrend)],
                ];
                if (typeof echarts === 'undefined') {
                    document.querySelectorAll('.chart-container').forEach(el => {
                        el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#ef5350;font-size:14px;">图表库加载失败，请刷新页面重试</div>';
                    });
                } else {
                    renders.forEach(([id, fn]) => { try { fn(); } catch (e) { console.error(id, e); } });
                }

                // Force resize after rendering to fix mobile display
                setTimeout(resizeAllCharts, 100);
                setTimeout(resizeAllCharts, 500);
            } catch (e) {
                console.error('loadAll error:', e);
            }
        }

        function renderTrend(data) {
            const chart = initChart('trendChart');
            if (!chart) return;
            chart.setOption({
                tooltip: {
                    trigger: 'axis',
                    formatter: function (params) {
                        let s = params[0].axisValue + '<br/>';
                        params.forEach(p => {
                            const val = p.seriesName === '交易笔数' ? p.value + '笔' : (p.value / 10000).toFixed(2) + '万元';
                            s += `${p.marker} ${p.seriesName}: ${val}<br/>`;
                        });
                        return s;
                    }
                },
                legend: { data: ['销售额', '毛利额', '交易笔数'], textStyle: { color: '#78909c' }, top: 0 },
                grid: { left: 60, right: 60, top: 40, bottom: 30 },
                xAxis: {
                    type: 'category', data: data.dates.map(d => d.slice(5)),
                    axisLabel: { color: '#546e7a' }, axisLine: { lineStyle: { color: '#1e3a5f' } }
                },
                yAxis: [
                    {
                        type: 'value', name: '金额', axisLabel: { color: '#546e7a', formatter: v => (v / 10000).toFixed(0) + '万' },
                        splitLine: { lineStyle: { color: '#1e3a5f44' } }, nameTextStyle: { color: '#546e7a' }
                    },
                    {
                        type: 'value', name: '笔数', axisLabel: { color: '#546e7a' },
                        splitLine: { show: false }, nameTextStyle: { color: '#546e7a' }
                    }
                ],
                series: [
                    { name: '销售额', type: 'bar', data: data.sales, itemStyle: { color: '#29b6f6' }, barWidth: '35%' },
                    {
                        name: '毛利额', type: 'line', data: data.profit, lineStyle: { color: '#66bb6a', width: 2 },
                        itemStyle: { color: '#66bb6a' }, symbol: 'circle', symbolSize: 4, smooth: true
                    },
                    {
                        name: '交易笔数', type: 'line', yAxisIndex: 1, data: data.bills,
                        lineStyle: { color: '#ffa726', width: 2, type: 'dashed' }, itemStyle: { color: '#ffa726' },
                        symbol: 'none', smooth: true
                    }
                ]
            });
        }

        function renderStoreRank(data) {
            const chart = initChart('storeChart');
            if (!chart) return;
            const stores = data.stores.slice().reverse();
            const sales = data.sales.slice().reverse();
            const profit = data.profit.slice().reverse();
            chart.setOption({
                tooltip: {
                    trigger: 'axis',
                    formatter: p => p.map(i => `${i.marker} ${i.seriesName}: ${(i.value / 10000).toFixed(2)}万`).join('<br/>')
                },
                legend: { data: ['销售额', '毛利额'], textStyle: { color: '#78909c' }, top: 0 },
                grid: { left: 80, right: 20, top: 35, bottom: 10 },
                xAxis: {
                    type: 'value', axisLabel: { color: '#546e7a', formatter: v => (v / 10000).toFixed(0) + '万' },
                    splitLine: { lineStyle: { color: '#1e3a5f44' } }
                },
                yAxis: {
                    type: 'category', data: stores, axisLabel: { color: '#b0bec5', fontSize: 11 },
                    axisLine: { lineStyle: { color: '#1e3a5f' } }
                },
                series: [
                    { name: '销售额', type: 'bar', data: sales, itemStyle: { color: '#29b6f6' }, barWidth: '45%' },
                    { name: '毛利额', type: 'bar', data: profit, itemStyle: { color: '#66bb6a' }, barWidth: '45%' }
                ]
            });
        }

        function renderCategory(data) {
            const chart = initChart('categoryChart');
            if (!chart) return;
            const pieData = data.categories.map((c, i) => ({
                name: c, value: data.sales[i],
                profit: data.profit[i]
            }));
            chart.setOption({
                tooltip: {
                    formatter: p => `${p.name}<br/>销售: ${(p.value / 10000).toFixed(2)}万<br/>毛利: ${(p.data.profit / 10000).toFixed(2)}万<br/>占比: ${p.percent.toFixed(1)}%`
                },
                legend: { orient: 'horizontal', bottom: 0, textStyle: { color: '#78909c' } },
                series: [{
                    type: 'pie', radius: ['40%', '70%'], center: ['50%', '45%'],
                    label: { formatter: '{b}\n{d}%', color: '#b0bec5', fontSize: 12 },
                    data: pieData,
                    itemStyle: { borderColor: '#0f1923', borderWidth: 3 },
                    color: ['#ef5350', '#ffa726', '#4fc3f7', '#66bb6a', '#78909c']
                }]
            });
        }

        function renderHourly(data) {
            const chart = initChart('hourlyChart');
            if (!chart) return;
            chart.setOption({
                tooltip: {
                    trigger: 'axis',
                    formatter: p => {
                        let s = p[0].axisValue + '<br/>';
                        p.forEach(i => {
                            const val = i.seriesName === '交易笔数' ? i.value + '笔' : i.value.toFixed(0) + '元';
                            s += `${i.marker} ${i.seriesName}: ${val}<br/>`;
                        });
                        return s;
                    }
                },
                legend: { data: ['销售额', '交易笔数'], textStyle: { color: '#78909c' }, top: 0 },
                grid: { left: 55, right: 55, top: 35, bottom: 30 },
                xAxis: {
                    type: 'category', data: data.hours, axisLabel: { color: '#546e7a' },
                    axisLine: { lineStyle: { color: '#1e3a5f' } }
                },
                yAxis: [
                    {
                        type: 'value', name: '金额', axisLabel: { color: '#546e7a' },
                        splitLine: { lineStyle: { color: '#1e3a5f44' } }, nameTextStyle: { color: '#546e7a' }
                    },
                    {
                        type: 'value', name: '笔数', axisLabel: { color: '#546e7a' },
                        splitLine: { show: false }, nameTextStyle: { color: '#546e7a' }
                    }
                ],
                series: [
                    {
                        name: '销售额', type: 'bar', data: data.sales, itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: '#4fc3f7' }, { offset: 1, color: '#0277bd' }
                            ])
                        }, barWidth: '50%'
                    },
                    {
                        name: '交易笔数', type: 'line', yAxisIndex: 1, data: data.bills,
                        lineStyle: { color: '#ffa726', width: 2 }, itemStyle: { color: '#ffa726' },
                        symbol: 'circle', symbolSize: 4, smooth: true
                    }
                ]
            });
        }

        function renderTopProducts(data) {
            const container = document.getElementById('topProducts');
            let html = '<table class="product-table"><thead><tr><th>#</th><th>商品</th><th>销售额</th><th>数量</th><th>毛利</th></tr></thead><tbody>';
            data.products.forEach((p, i) => {
                const rankCls = i < 3 ? `rank-${i + 1}` : 'rank-n';
                const profitCls = data.profit[i] >= 0 ? 'profit-positive' : 'profit-negative';
                html += `<tr>
            <td><span class="rank-badge ${rankCls}">${i + 1}</span></td>
            <td>${p}</td>
            <td>${data.sales[i].toFixed(0)}</td>
            <td>${data.qty[i]}</td>
            <td class="${profitCls}">${data.profit[i].toFixed(0)}</td>
        </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function renderPayment(data) {
            const chart = initChart('paymentChart');
            if (!chart) return;
            const pieData = data.types.map((t, i) => ({ name: t, value: data.amounts[i] }));
            chart.setOption({
                tooltip: { formatter: p => `${p.name}<br/>${(p.value / 10000).toFixed(2)}万元 (${p.percent.toFixed(1)}%)` },
                legend: { orient: 'vertical', right: 10, top: 'middle', textStyle: { color: '#78909c' } },
                series: [{
                    type: 'pie', radius: ['45%', '72%'], center: ['40%', '50%'],
                    label: { show: false },
                    data: pieData,
                    itemStyle: { borderColor: '#0f1923', borderWidth: 3 },
                    color: ['#4fc3f7', '#66bb6a', '#ffa726', '#ab47bc', '#ef5350', '#78909c']
                }]
            });
        }

        function renderStoreTrend(data) {
            const chart = initChart('storeTrendChart');
            if (!chart) return;
            const series = data.series.map((s, i) => ({
                name: s.name, type: 'line', data: s.data,
                lineStyle: { width: 2 }, symbol: 'circle', symbolSize: 4,
                smooth: true, itemStyle: { color: colors[i % colors.length] }
            }));
            chart.setOption({
                tooltip: {
                    trigger: 'axis',
                    formatter: params => {
                        let s = params[0].axisValue + '<br/>';
                        params.sort((a, b) => b.value - a.value).forEach(p => {
                            s += `${p.marker} ${p.seriesName}: ${(p.value / 10000).toFixed(2)}万<br/>`;
                        });
                        return s;
                    }
                },
                legend: { type: 'scroll', bottom: 0, textStyle: { color: '#78909c', fontSize: 11 } },
                grid: { left: 55, right: 15, top: 10, bottom: 45 },
                xAxis: {
                    type: 'category', data: data.dates.map(d => d.slice(5)),
                    axisLabel: { color: '#546e7a' }, axisLine: { lineStyle: { color: '#1e3a5f' } }
                },
                yAxis: {
                    type: 'value', axisLabel: { color: '#546e7a', formatter: v => (v / 10000).toFixed(0) + '万' },
                    splitLine: { lineStyle: { color: '#1e3a5f44' } }
                },
                series: series
            });
        }

        // Responsive resize
        function resizeAllCharts() {
            document.querySelectorAll('.chart-container').forEach(el => {
                const chart = echarts.getInstanceByDom(el);
                if (chart) chart.resize();
            });
        }
        window.addEventListener('resize', resizeAllCharts);
        // Also handle orientation change on mobile
        window.addEventListener('orientationchange', () => {
            setTimeout(resizeAllCharts, 300);
        });

        // Load and auto-refresh
        loadAll();
        setInterval(loadAll, 600000); // 10min refresh
    </script>
</body>

</html>
