<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>门店运营 - 宜家天润超市</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script>if (typeof echarts === 'undefined') document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"><\/script>')</script>
</head>
<body>

    <div class="header">
        <div class="subpage-header-left">
            <a href="/" class="back-btn" title="返回首页"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></a>
            <h1>门店运营</h1>
        </div>
        <div class="header-right">
            <div class="date-info">
                数据日期: <span class="date-val" id="dataDate">加载中...</span>
                <br>刷新时间: <span id="refreshTime"></span>
            </div>
        </div>
    </div>

    <div class="dashboard">
        <!-- 各时段总客流 -->
        <div class="chart-panel">
            <h3>各时段总客流</h3>
            <div class="chart-container" id="hourlyChart"></div>
        </div>

        <!-- 门店销售排名 -->
        <div class="chart-panel">
            <h3>门店销售排名</h3>
            <div class="chart-container" id="storeChart"></div>
        </div>
    </div>

    <div class="refresh-info">数据每5分钟缓存刷新 | 页面每10分钟自动刷新</div>
    <script src="/static/js/stores.js"></script>
</body>
</html>
